services:
  - type: web
    name: advaylink
    env: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: MASTER_KEY
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: DB_SSL
        value: "true"
      - key: DB_POOL_MAX
        value: "5"
      - key: MESSAGE_COOLDOWN_MS
        value: "5000"
